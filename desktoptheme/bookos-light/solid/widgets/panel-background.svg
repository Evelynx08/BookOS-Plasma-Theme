<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="173" height="56" viewBox="0 0 173 56" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css" id="current-color-scheme">
      .ColorScheme-Background {
        color:#ffffff;
        stop-color:#ffffff;
      }
      .ColorScheme-Text {
        color:#000000;
        stop-color:#000000;
      }
      .ColorScheme-Highlight {
        color:#007aff;
        stop-color:#007aff;
      }
      .ColorScheme-ButtonBackground {
        color:#e5e5ea;
        stop-color:#e5e5ea;
      }
      .ColorScheme-Frame {
        color:#e5e5ea;
        stop-color:#e5e5ea;
      }
    </style>
  </defs>

  <!-- ═══ HINT MARGIN ELEMENTS (magenta = invisible, defines 9-patch margins) ═══ -->
  <rect id="hint-top-margin"    x="14" y="0"     width="1" height="14" fill="#ff00ff" fill-opacity="0"/>
  <rect id="hint-bottom-margin" x="14" y="42" width="1" height="14" fill="#ff00ff" fill-opacity="0"/>
  <rect id="hint-left-margin"   x="0"   y="14"   width="14" height="1" fill="#ff00ff" fill-opacity="0"/>
  <rect id="hint-right-margin"  x="159" y="14" width="14" height="1" fill="#ff00ff" fill-opacity="0"/>

  <!-- ═══ CORNERS (rounded quarter-circles) ═══ -->
  <!-- topleft -->
  <path id="topleft"
        class="ColorScheme-Background"
        style="fill:#ffffff;fill-opacity:1"
        d="M 0,14 C 0,6.2678 6.2678,0 14,0 L 14,14 Z"/>

  <!-- topright -->
  <path id="topright"
        class="ColorScheme-Background"
        style="fill:#ffffff;fill-opacity:1"
        d="M 159,0 C 166.7322,0 173,6.2678 173,14 L 159,14 Z"/>

  <!-- bottomleft -->
  <path id="bottomleft"
        class="ColorScheme-Background"
        style="fill:#ffffff;fill-opacity:1"
        d="M 0,42 C 0,49.7322 6.2678,56 14,56 L 14,42 Z"/>

  <!-- bottomright -->
  <path id="bottomright"
        class="ColorScheme-Background"
        style="fill:#ffffff;fill-opacity:1"
        d="M 173,42 C 173,49.7322 166.7322,56 159,56 L 159,42 Z"/>

  <!-- ═══ EDGES ═══ -->
  <rect id="top"    class="ColorScheme-Background" style="fill:#ffffff;fill-opacity:1" x="14" y="0"     width="145" height="14"/>
  <rect id="bottom" class="ColorScheme-Background" style="fill:#ffffff;fill-opacity:1" x="14" y="42" width="145" height="14"/>
  <rect id="left"   class="ColorScheme-Background" style="fill:#ffffff;fill-opacity:1" x="0"   y="14"   width="14"     height="28"/>
  <rect id="right"  class="ColorScheme-Background" style="fill:#ffffff;fill-opacity:1" x="159" y="14" width="14"     height="28"/>

  <!-- ═══ CENTER ═══ -->
  <rect id="center" class="ColorScheme-Background" style="fill:#ffffff;fill-opacity:1" x="14" y="14" width="145" height="28"/>

  <!-- compose hint -->
  <rect id="hint-compose-over-svg" x="0" y="0" width="0" height="0" fill="#ff00ff" fill-opacity="0"/>
</svg>
