<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="200" height="200" viewBox="0 0 200 200" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css" id="current-color-scheme">
      .ColorScheme-Background {
        color:#1c1c1e;
        stop-color:#1c1c1e;
      }
      .ColorScheme-Text {
        color:#ffffff;
        stop-color:#ffffff;
      }
      .ColorScheme-Highlight {
        color:#0a84ff;
        stop-color:#0a84ff;
      }
      .ColorScheme-ButtonBackground {
        color:#1c1c1e;
        stop-color:#1c1c1e;
      }
    </style>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="8"
                    flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- ═══ HINT MARGINS (9-patch) ═══ -->
  <rect id="hint-top-margin"    x="12" y="0"     width="1" height="12" fill="#ff00ff" fill-opacity="0"/>
  <rect id="hint-bottom-margin" x="12" y="188" width="1" height="12" fill="#ff00ff" fill-opacity="0"/>
  <rect id="hint-left-margin"   x="0"   y="12"   width="12" height="1" fill="#ff00ff" fill-opacity="0"/>
  <rect id="hint-right-margin"  x="188" y="12" width="12" height="1" fill="#ff00ff" fill-opacity="0"/>

  <!-- Shadow hint margins (reserve extra space for shadow blur) -->
  <rect id="shadow-hint-top-margin"    x="12" y="0"     width="1" height="12" fill="#ff6600" fill-opacity="0"/>
  <rect id="shadow-hint-bottom-margin" x="12" y="188" width="1" height="12" fill="#ff6600" fill-opacity="0"/>
  <rect id="shadow-hint-left-margin"   x="0"   y="12"   width="12" height="1" fill="#ff6600" fill-opacity="0"/>
  <rect id="shadow-hint-right-margin"  x="188" y="12" width="12" height="1" fill="#ff6600" fill-opacity="0"/>

  <!-- ═══ SHADOW LAYER ═══ -->
  <path id="shadow"
        d="M 30,12 L 170,12 C 179.9414,12 188,20.0586 188,30 L 188,170 C 188,179.9414 179.9414,188 170,188 L 30,188 C 20.0586,188 12,179.9414 12,170 L 12,30 C 12,20.0586 20.0586,12 30,12 Z"
        fill="#000000" fill-opacity="0.55"
        filter="url(#shadow)"/>

  <!-- ═══ BACKGROUND FILL ═══ -->
  <!-- corners -->
  <path id="topleft"
        class="ColorScheme-Background"
        style="fill:#1c1c1e;fill-opacity:1"
        d="M 12,30 C 12,20.0586 20.0586,12 30,12 L 30,30 Z"/>
  <path id="topright"
        class="ColorScheme-Background"
        style="fill:#1c1c1e;fill-opacity:1"
        d="M 170,12 C 179.9414,12 188,20.0586 188,30 L 170,30 Z"/>
  <path id="bottomleft"
        class="ColorScheme-Background"
        style="fill:#1c1c1e;fill-opacity:1"
        d="M 12,170 C 12,179.9414 20.0586,188 30,188 L 30,170 Z"/>
  <path id="bottomright"
        class="ColorScheme-Background"
        style="fill:#1c1c1e;fill-opacity:1"
        d="M 188,170 C 188,179.9414 179.9414,188 170,188 L 170,170 Z"/>

  <!-- edges -->
  <rect id="top"    class="ColorScheme-Background" style="fill:#1c1c1e;fill-opacity:1" x="30" y="12"   width="140" height="18"/>
  <rect id="bottom" class="ColorScheme-Background" style="fill:#1c1c1e;fill-opacity:1" x="30" y="170" width="140" height="18"/>
  <rect id="left"   class="ColorScheme-Background" style="fill:#1c1c1e;fill-opacity:1" x="12"   y="30" width="18"      height="140"/>
  <rect id="right"  class="ColorScheme-Background" style="fill:#1c1c1e;fill-opacity:1" x="170" y="30" width="18"      height="140"/>

  <!-- center -->
  <rect id="center" class="ColorScheme-Background" style="fill:#1c1c1e;fill-opacity:1" x="30" y="30" width="140" height="140"/>

  <!-- compose hint -->
  <rect id="hint-compose-over-svg" x="0" y="0" width="0" height="0" fill="#ff00ff" fill-opacity="0"/>
</svg>
